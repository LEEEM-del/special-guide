        }

        draw() {
            if (this.type === 0 && dorayakiImg.complete) {
                const size = 80;
                ctx.drawImage(dorayakiImg, this.x - size / 2, this.y - size / 2, size, size);
                return;
            }

            if (this.type === 1 && shieldImg.complete) {
                const size = 42;
                ctx.drawImage(shieldImg, this.x - size / 2, this.y - size / 2, size, size);
                return;
            }

            if (this.type === 2 && healthPackImg.complete) {
                const size = 63;
                ctx.drawImage(healthPackImg, this.x - size / 2, this.y - size / 2, size, size);
                return;
            }

            // time-stop icon
                if (this.type === 3) {
                    // 优先使用外部贴图（assets/img/player/item/time_stop.png），否则回退到内置绘制
                    if (timeStopImg.complete && timeStopImg.naturalWidth > 0 && timeStopImg.naturalHeight > 0) {
                        const size = 82;
                        ctx.save();
                        ctx.imageSmoothingEnabled = false;
                        ctx.drawImage(timeStopImg, this.x - size/2, this.y - size/2, size, size);
                        ctx.restore();
                    } else {
                        this.drawTimeStopIcon();
                    }
                    return;
                }

            // dango icon (damage)
            if (this.type === 4) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = 'rgba(255,180,180,0.95)';
                ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = '#8b2e2e'; ctx.font = '12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('🍡', 0, 0);
                ctx.restore();
                return;
            }

            if (this.type === 0) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = '#d4a574';
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8b4513';
                ctx.beginPath();
                ctx.arc(0, 0, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            } else if (this.type === 1) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 215, 0, 0.6)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.9)';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.restore();
            } else if (this.type === 2) {
                ctx.save();
                ctx.translate(this.x, this.y);
                // Draw health pack with cross
                ctx.fillStyle = '#00cc44';
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-12, -3, 24, 6);
                ctx.fillRect(-3, -12, 6, 24);
                ctx.restore();
            }
        }

        update() {
            this.x -= this.speed;
        }
    }

    // --- Boss fight classes and helpers ---
    const bossImg = new Image();
    bossImg.src = 'assets/img/player/enemy/BOSS.png';
    const bossImg02 = new Image();
    bossImg02.src = 'assets/img/player/enemy/BOSS02.png';
    const bossDecoImg = new Image();
    bossDecoImg.src = 'assets/img/player/enemy/BOSS00.png';

    class Laser {
        constructor(x, y, vx, vy, width = 10, height = 6, color = '#ff4444') {
            this.x = x;
            this.y = y;
            this.vx = vx;
            this.vy = vy;
            this.width = width;
            this.height = height;
            this.color = color;
            this.frozen = false; // used by time-stop
            this._stored = null; // store velocities when frozen
        }

        update() {
            if (this.frozen) return;
            this.x += this.vx;
            this.y += this.vy;
        }

        draw() {
            ctx.save();
            // glow effect for laser
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 12;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y - this.height / 2, this.width, this.height);
            ctx.restore();
        }
    }

    class Boss {
        constructor() {
            // Boss occupies right half area, half vertical height (enlarged 2x)
            this.width = Math.min(840, Math.floor(canvas.width * 0.9));
            this.height = Math.floor(canvas.height * 1.0);
            this.x = canvas.width - this.width + 276; // right half, moved 300px right total
            this.y = Math.floor((canvas.height - this.height) / 2);
            this.maxHp = 100;
            this.hp = this.maxHp;
            this.sprite = bossImg;
            this.phaseChanged = false;

            // firing control
            this.fireCooldown = 0;
            this.fireInterval = 60; // frames between shots (varies by pattern)
            this.patternTimer = 0;
            this.currentPattern = 0;

            // time stop control
            this.timeStopped = false;
            this.timeStopTimer = 0;
        }

        // Apply damage to the boss. When hp <= 0 we switch sprite to BOSS02 and end fight.
        takeDamage(amount) {
            if (this.hp <= 0) return;
            this.hp = Math.max(0, this.hp - amount);
            createFloatingText(`BOSS -${amount}`, this.x + this.width / 2, this.y + 30, '#ffdddd');
            if (this.hp <= 0 && !this.phaseChanged) {
                this.phaseChanged = true;
                this.sprite = bossImg02;
                // Start black screen flashing effect
                bossDefeatedPhase = 1;
                bossDefeatedTimer = 0;
            }
        }

        // Activate time stop: freeze existing lasers and stop firing for `duration` seconds
        activateTimeStop(durationSeconds = 3) {
            if (this.timeStopped) return;
            this.timeStopped = true;
            this.timeStopTimer = Math.floor(durationSeconds * TARGET_FPS);
            // freeze lasers
            for (const l of lasers) {
                if (!l.frozen) {
                    l._stored = { vx: l.vx, vy: l.vy };
                    l.vx = 0; l.vy = 0; l.frozen = true;
                }
            }
        }

        update() {
            if (this.timeStopped) {
                this.timeStopTimer--;
                if (this.timeStopTimer <= 0) {
                    this.timeStopped = false;
                    // restore lasers
                    for (const l of lasers) {
                        if (l.frozen && l._stored) {
                            l.vx = l._stored.vx; l.vy = l._stored.vy; l.frozen = false; l._stored = null;
                        }
                    }
                }
                return;
            }

            // boss selects a pattern every few seconds
            this.patternTimer--;
            if (this.patternTimer <= 0) {
                this.currentPattern = Math.floor(Math.random() * 4); // 0..3
                this.patternTimer = 90 + Math.floor(Math.random() * 120);
                this.fireCooldown = 0;
            }

            // fire according to pattern
            if (this.fireCooldown <= 0) {
                this.firePattern(this.currentPattern);
                this.fireCooldown = this.fireInterval;
            } else {
                this.fireCooldown--;
            }
        }

        // create lasers according to a named pattern
        firePattern(patternId) {
            const cx = this.x; // fire from left face of boss
            const cy = this.y + this.height / 2;
            switch (patternId) {
                case 0: // aimed shot at player
                    {
                        const angle = Math.atan2(player.y - cy, player.x - cx);
                        const speed = 8;
                        const vx = Math.cos(angle) * speed;
                        const vy = Math.sin(angle) * speed;
                        lasers.push(new Laser(cx + 100, cy, vx, vy, 24, 12, '#ff4444'));
                    }
                    break;
                case 1: // spread fan
                    {
                        const spread = 5;
                        const baseAngle = Math.atan2(player.y - cy, player.x - cx);
                        for (let i = -Math.floor(spread/2); i <= Math.floor(spread/2); i++) {
                            const angle = baseAngle + i * (Math.PI / 36);
                            const speed = 7 + Math.random() * 1.5;
                            lasers.push(new Laser(cx + 100, cy + (i * 8), Math.cos(angle)*speed, Math.sin(angle)*speed, 20, 12, '#ffaa00'));
                        }
                    }
                    break;
                case 2: // horizontal wave: multiple lasers with sine vertical velocity
                    {
                        const count = 6;
                        for (let i = 0; i < count; i++) {
                            const y = this.y + (i / (count-1)) * this.height;
                            const speed = 6 + Math.random() * 1.6;
                            const vy = Math.sin(frames / 20 + i) * 1.8;
                            lasers.push(new Laser(cx + 100, y, -speed, vy, 20, 12, '#ffff00'));
                        }
                    }
                    break;
                case 3: // rotating twin beams
                    {
                        const rotSpeed = 0.08;
                        const u = Math.sin(frames * rotSpeed);
                        const angle1 = Math.atan2(player.y - cy, player.x - cx) + u * 0.6;
                        const angle2 = Math.atan2(player.y - cy, player.x - cx) - u * 0.6;
                        const s = 9;
                        lasers.push(new Laser(cx + 100, cy - 40, Math.cos(angle1)*s, Math.sin(angle1)*s, 28, 12, '#ff66ff'));
                        lasers.push(new Laser(cx + 100, cy + 40, Math.cos(angle2)*s, Math.sin(angle2)*s, 28, 12, '#ff66ff'));
                    }
                    break;
            }
        }

        draw() {
            ctx.save();
            // draw boss sprite if available
            if (this.sprite && this.sprite.complete) {
                ctx.drawImage(this.sprite, this.x, this.y, this.width, this.height);
            } else {
                // fallback: big rectangle with HP bar
                ctx.fillStyle = '#444';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
            // draw HP bar
            const barW = this.width * 0.9;
            const barH = 8;
            const bx = this.x + (this.width - barW) / 2;
            const by = this.y - 18;
            ctx.fillStyle = '#222';
            ctx.fillRect(bx, by, barW, barH);
            ctx.fillStyle = '#ff3333';
            ctx.fillRect(bx, by, barW * (this.hp / this.maxHp), barH);
            ctx.strokeStyle = '#000'; ctx.strokeRect(bx, by, barW, barH);
            ctx.restore();
        }
    }

    function initLevel(levelNum) {
        currentLevel = levelNum;
        updateHudLevelSkin();
        switchLevelBgm(currentLevel);
        progress = 0;
        obstacles = [];
        powerUps = [];
        // reset boss/lasers when starting boss fight
        lasers = [];
        boss = null;
        levelGateOpen = false;
        levelGate = null;
        healthPackSpawned = false;
        healthPackSpawnProgress = 2500 + Math.random() * 9000;
        updateProgressBar();
        renderEnemyOverview();
        renderRewardOverview();
        if (!suppressCheckpointSave) saveCheckpoint();
        startLevelPreview();
    }

    function getDoorRenderSize() {
        const baseWidth = 64;
        const baseHeight = 96;
        const scaleMultiplier = (isTutorialSession && tutorialMapActive) ? 4 : 2;
        const activeDoorImage = (isTutorialSession && tutorialMapActive) ? tutorialDoorImg : anywhereDoorImg;

        if (activeDoorImage.complete && activeDoorImage.naturalWidth > 0 && activeDoorImage.naturalHeight > 0) {
            const fitScale = Math.min(baseWidth / activeDoorImage.naturalWidth, baseHeight / activeDoorImage.naturalHeight);
            const scale = fitScale * scaleMultiplier;
            return {
                width: activeDoorImage.naturalWidth * scale,
                height: activeDoorImage.naturalHeight * scale
            };
        }

        return {
            width: baseWidth * scaleMultiplier,
            height: baseHeight * scaleMultiplier
        };
    }

    function drawDoor(door) {
        const activeDoorImage = (isTutorialSession && tutorialMapActive) ? tutorialDoorImg : anywhereDoorImg;
        if (activeDoorImage.complete && activeDoorImage.naturalWidth > 0 && activeDoorImage.naturalHeight > 0) {
            ctx.save();
            ctx.drawImage(activeDoorImage, door.x, door.y, door.width, door.height);
            ctx.restore();
            return;
        }

        ctx.save();
        ctx.translate(door.x, door.y);
        ctx.fillStyle = 'rgba(255, 132, 179, 0.95)';
        ctx.fillRect(0, 0, door.width, door.height);
        ctx.fillStyle = '#ffd8e8';
        ctx.fillRect(6, 6, door.width - 12, door.height - 12);
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(door.width / 2, door.height / 2, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff88bb';
        ctx.beginPath();
        ctx.arc(door.width / 2, door.height / 2, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#f6c000';
        ctx.beginPath();
        ctx.arc(door.width - 12, door.height / 2, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    function openLevelGate() {
        if (levelGateOpen) return;
        levelGateOpen = true;
        obstacles = [];
        powerUps = [];
        const doorSize = getDoorRenderSize();

        if (isTutorialSession && tutorialMapActive) {
            const floorY = canvas.height - doorSize.height - 24 - 30;
            levelGate = {
                worldX: Math.max(canvas.width + 80, tutorialMapWidth - doorSize.width - 40),
                y: floorY,
                width: doorSize.width,
                height: doorSize.height,
                x: canvas.width - doorSize.width - 40
            };
            createFloatingText('传送门出现!', canvas.width - 210, levelGate.y - 18, '#8ab6ff');
            return;
        }

        levelGate = {
            x: LEVELS[currentLevel].doorPosition.x,
            y: LEVELS[currentLevel].doorPosition.y - 30,
            width: doorSize.width,
            height: doorSize.height
        };
        createFloatingText('任意门出现!', levelGate.x + 20, levelGate.y - 18, '#ff66aa');
    }

    function advanceLevel() {
        if (currentLevel < 4) {
            playWinSfx();
            initLevel(currentLevel + 1);
        } else {
            triggerWinAnimation();
        }
    }

    function drawBackground() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const difficultyFactor = getDifficultySpeedMultiplier();

        if (isTutorialSession && tutorialMapActive) {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (tutorialBgImg.complete && tutorialBgImg.naturalWidth > 0 && tutorialBgImg.naturalHeight > 0) {
                const scale = Math.max(
                    canvas.width / tutorialBgImg.naturalWidth,
                    canvas.height / tutorialBgImg.naturalHeight
                );
                tutorialMapWidth = Math.max(canvas.width, tutorialBgImg.naturalWidth * scale);
                const maxCameraX = Math.max(0, tutorialMapWidth - canvas.width);
                tutorialMapCameraX = Math.max(0, Math.min(maxCameraX, tutorialMapCameraX));
                ctx.drawImage(tutorialBgImg, -tutorialMapCameraX, 0, tutorialMapWidth, canvas.height);
            } else {
                tutorialMapWidth = canvas.width;
                ctx.fillStyle = '#141414';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            return;
        }

        if (currentLevel === 1 && seaBgImg.complete) {
            const bgOffset = (frames * 0.8 * difficultyFactor) % canvas.width;
            ctx.drawImage(seaBgImg, -bgOffset, 0, canvas.width, canvas.height);
            ctx.drawImage(seaBgImg, canvas.width - bgOffset, 0, canvas.width, canvas.height);
        } else if (currentLevel === 2 && spaceBgImg.complete) {
            const bgOffset = (frames * 0.7 * difficultyFactor) % canvas.width;
            ctx.drawImage(spaceBgImg, -bgOffset, 0, canvas.width, canvas.height);
            ctx.drawImage(spaceBgImg, canvas.width - bgOffset, 0, canvas.width, canvas.height);
        } else if (currentLevel === 3 && skyBgImg.complete) {
            const bgOffset = (frames * 1 * difficultyFactor) % canvas.width;
            ctx.drawImage(skyBgImg, -bgOffset, 0, canvas.width, canvas.height);
            ctx.drawImage(skyBgImg, canvas.width - bgOffset, 0, canvas.width, canvas.height);
            return;
        } else if (currentLevel === 4 && fourthBgImg.complete) {
            const bgOffset = (frames * 1 * difficultyFactor) % canvas.width;
            ctx.drawImage(fourthBgImg, -bgOffset, 0, canvas.width, canvas.height);
            ctx.drawImage(fourthBgImg, canvas.width - bgOffset, 0, canvas.width, canvas.height);
            return;
        } else if (currentLevel === 1) {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#006994');
            gradient.addColorStop(1, '#001e3b');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }


    }

    function checkCollision(circle, rect) {
        const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
        const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
        const distanceX = circle.x - closestX;
        const distanceY = circle.y - closestY;
        return (distanceX * distanceX) + (distanceY * distanceY) < (circle.radius * circle.radius);
    }

    function checkCircleCollision(c1, c2) {
        const dx = c1.x - c2.x;
        const dy = c1.y - c2.y;
        return Math.sqrt(dx * dx + dy * dy) < (c1.radius + c2.radius);
    }

    function triggerWinAnimation() {
        // 第四关进入最终结局，其它关卡继续直接回主菜单
        tutorialPanel.classList.add('hidden');
        // reset animation state
        animPhase = 0;
        animTimer = 0;
        obstacles = [];
        powerUps = [];
        levelGateOpen = false;
        levelGate = null;
        animData = {};
        stopAllLevelBgm(true);

        if (currentLevel === 4) {
            playFinalEndingSequence();
            return;
        }

        // go to main menu
        currentState = STATE.START;
        if (startScreen) startScreen.classList.remove('hidden');
        if (typeof winScreen !== 'undefined' && winScreen) winScreen.classList.add('hidden');
    }

    function triggerLoseAnimation() {
        if (!isTutorialSession) {
            saveCheckpoint({ level: currentLevel, lives: 3, hasShield: false, tutorialMode });
        }
        stopAllLevelBgm(true);
        currentState = STATE.ANIM_LOSE;
        tutorialPanel.classList.add('hidden');
        animPhase = 0;
        animTimer = 0;
        player.hasPropeller = false;
    }

    function updateWinAnimation() {
        // Win animation removed: immediately return to main menu if this is ever called
        stopAllLevelBgm(true);
        currentState = STATE.START;
        if (startScreen) startScreen.classList.remove('hidden');
    }

    function drawWinAnimation() {
        // Win animation removed: nothing to draw here
    }

    function updateLoseAnimation() {
        animTimer++;
        player.y += 1.5;
        if (player.y >= canvas.height - player.radius) {
            player.y = canvas.height - player.radius;
            currentState = STATE.UI_GAMEOVER;
            gameOverScreen.classList.remove('hidden');
        }
    }

    function drawLoseAnimation() {
        player.draw();
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🪫💦', player.x, player.y - 40);
    }

    function initGame(saveData = null) {
        isPaused = false;
        pauseOverlay.classList.add('hidden');
        stopAllLevelBgm(true);

        player.x = 150;
        player.y = 200;
        player.lives = 3;
        player.hasShield = false;
        player.isInvincible = false;
        player.hasPropeller = true;
        player.moveSpeed = PLAYER_SPEED_START * getDifficultySpeedMultiplier();
        animData.cannonActive = false;

        for (const key in keys) keys[key] = false;

        progress = 0;
        frames = 0;
        obstacles = [];
        powerUps = [];
        floatingTexts = [];
        levelGateOpen = false;
        levelGate = null;

        if (!isTutorialSession) {
            tutorialMapActive = false;
            tutorialMapWidth = 0;
            tutorialMapCameraX = 0;
            tutorialPlayerWorldX = 0;
            tutorialDoorEntered = false;
        }

        winSfx.pause();
        winSfx.currentTime = 0;
        clearStoryTimer();
        storyOverlay.classList.add('hidden');

        if (saveData) {
            player.lives = Math.max(1, Math.min(3, Number(saveData.lives) || 3));
            player.hasShield = Boolean(saveData.hasShield);
            if (typeof saveData.tutorialMode === 'boolean') {
                setTutorialMode(saveData.tutorialMode);
            }
            initLevel(Math.max(1, Math.min(4, Number(saveData.level) || 1)));
        } else {
            initLevel(1);
        }
        updateLivesDisplay();

        currentState = STATE.LEVEL_PREVIEW;
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        winScreen.classList.add('hidden');

        gameLoop();
    }

    function startNewGame() {
        clearCheckpoint();
        initGame();
    }

    function startNewGameWithIntro() {
        clearCheckpoint();
        coverOptions.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        winScreen.classList.add('hidden');

        playIntroThenStart(() => {
            startTutorialSession();
        });
    }

    function startFromCheckpoint() {
        const save = getSavedCheckpoint();
        if (!save) {
            coverSaveHint.textContent = '存档点：暂无可用存档，请先开始新游戏';
            return;
        }
        initGame(save);
    }

    function restartFromCurrentLevel() {
        const save = getSavedCheckpoint();
        if (save) {
            initGame(save);
            return;
        }
        initGame({ level: currentLevel, lives: 3, hasShield: false });
    }

    function updateLivesDisplay() {
        const maxLives = 3;
        const clampedLives = Math.max(0, Math.min(maxLives, Number(player.lives) || 0));
        const halfUnits = Math.round(clampedLives * 2);
        let heartsHtml = '';

        for (let i = 0; i < maxLives; i++) {
            const remain = halfUnits - i * 2;
            let state = 'empty';
            if (remain >= 2) state = 'full';
            else if (remain === 1) state = 'half';
            heartsHtml += `<span class="heart-icon ${state}" aria-hidden="true"></span>`;
        }

        livesDisplay.innerHTML = heartsHtml;
        livesDisplay.setAttribute('aria-label', `血量 ${clampedLives}/${maxLives}`);
    }

    function updateHudLevelSkin() {
        playerStatusBox.classList.remove('level-1', 'level-2', 'level-3', 'level-4');
        if (currentLevel === 1) {
            playerStatusBox.classList.add('level-1');
        } else if (currentLevel === 2) {
            playerStatusBox.classList.add('level-2');
        } else if (currentLevel === 3) {
            playerStatusBox.classList.add('level-3');
        } else {
            playerStatusBox.classList.add('level-4');
        }
    }

    function updateProgressBar() {
        const percent = Math.min(100, (progress / MAX_PROGRESS) * 100);
        progressBar.style.width = percent + '%';
    }

    function updateLogic() {
        if (currentState !== STATE.PLAYING) return;

        // Ensure boss exists when entering level 4 playing state (covers non-tutorial path)
        if (currentLevel === 4 && !boss) {
            boss = new Boss();
            lasers = [];
        }

        if (isTutorialSession && tutorialMapActive) {
            updateTutorialFlow();
            updateTutorialPanel();

            if (!levelGateOpen) {
                openLevelGate();
            }

            let dx = 0;
            let dy = 0;
            if (keys.ArrowUp || keys.w) dy -= player.moveSpeed;
            if (keys.ArrowDown || keys.s) dy += player.moveSpeed;
            if (keys.ArrowLeft || keys.a) dx -= player.moveSpeed;
            if (keys.ArrowRight || keys.d) dx += player.moveSpeed;

            if (dx !== 0 || dy !== 0) tutorialHasMoved = true;

            tutorialPlayerWorldX = Math.max(player.radius, Math.min(tutorialMapWidth - player.radius, tutorialPlayerWorldX + dx));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y + dy));

            const cameraTarget = tutorialPlayerWorldX - canvas.width * 0.38;
            tutorialMapCameraX = Math.max(0, Math.min(Math.max(0, tutorialMapWidth - canvas.width), cameraTarget));
            player.x = tutorialPlayerWorldX - tutorialMapCameraX;

            if (levelGateOpen && levelGate) {
                const gateScreenRect = {
                    x: levelGate.worldX - tutorialMapCameraX,
                    y: levelGate.y,
                    width: levelGate.width,
                    height: levelGate.height
                };
                levelGate.x = gateScreenRect.x;
                drawDoor(gateScreenRect);
                if (!tutorialDoorEntered && checkCollision(player, gateScreenRect)) {
                    tutorialDoorEntered = true;
                    tutorialReachedGate = true;
                    isTutorialSession = false;
                    tutorialMapActive = false;
                    suppressCheckpointSave = false;
                    tutorialStartTime = 0;
                    tutorialHasMoved = false;
                    tutorialHasCollectedReward = false;
                    tutorialHintText = '';
                    setTutorialMode(false);
                    levelGateOpen = false;
                    levelGate = null;
                    tutorialPanel.classList.add('hidden');
                    initGame({ level: 1, lives: Math.max(1, player.lives), hasShield: player.hasShield, tutorialMode: false });
                    return;
                }
            }

            if (player.isInvincible) {
                player.invincibleTimer--;
                if (player.invincibleTimer <= 0) player.isInvincible = false;
            }
            statusDisplay.innerHTML = player.hasShield ? '🛡️' : '';
            player.draw();
            drawFloatingTexts();
            frames++;
            return;
        }

        if (updateTutorialFlow()) return;
        updateTutorialPanel();

        if (levelGateOpen) {
            player.update();
            player.draw();
            if (levelGate) {
                drawDoor(levelGate);
                if (checkCollision(player, levelGate)) {
                    if (isTutorialSession) {
                        tutorialReachedGate = true;
                        levelGateOpen = false;
                        levelGate = null;
                        createFloatingText('任意门通关指引完成!', player.x - 30, player.y - 20, '#00aa88');
                    } else {
                        advanceLevel();
                    }
                }
            }
            drawFloatingTexts();
            frames++;
            return;
        }

        progress += tutorialMode ? 4 : 5;
        updateProgressBar();

        const speedRate = Math.min(1, progress / MAX_PROGRESS);
        player.moveSpeed = (PLAYER_SPEED_START + (PLAYER_SPEED_END - PLAYER_SPEED_START) * speedRate) * getDifficultySpeedMultiplier();

        if (progress >= MAX_PROGRESS) {
            if (currentLevel === 4) {
                triggerWinAnimation();
            } else {
                openLevelGate();
            }
            return;
        }

        if (frames % 250 === 0) {
            if (!healthPackSpawned && progress >= healthPackSpawnProgress) {
                powerUps.push(new PowerUp(2));
                healthPackSpawned = true;
            } else {
                powerUps.push(new PowerUp());
            }
        }

        let spawnRate = Math.max(50, 90 - Math.floor(progress / 500));
        if (tutorialMode) spawnRate += 38;
        if (currentLevel === 4) {
            obstacles.length = 0;
        } else if (frames % spawnRate === 0) {
            obstacles.push(new Obstacle());
        }

        const progressRate = Math.min(1, progress / MAX_PROGRESS);
        const speedCurve = Math.pow(progressRate, 1.15);
        const difficultySpeedFactor = getDifficultySpeedMultiplier();
        const speedMultiplier = (1 + speedCurve * (0.85 + currentLevel * 0.25)) * (tutorialMode ? 0.78 : 1) * difficultySpeedFactor;
        const levelSpeedFactor = (1 + (currentLevel - 1) * 0.22) * difficultySpeedFactor;

        if (currentLevel !== 4) {
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                if (currentLevel === 3) {
                    obs.speed = (obs.type === 'plane'
                        ? OBSTACLE_SPEED_BASE + OBSTACLE_FAST_BONUS
                        : OBSTACLE_SPEED_BASE + Math.random() * OBSTACLE_SPEED_VARIATION) * speedMultiplier * levelSpeedFactor;
                } else {
                    obs.speed = (obs.type === 'shark' || obs.type === 'asteroid'
                        ? OBSTACLE_SPEED_BASE + OBSTACLE_FAST_BONUS
                        : OBSTACLE_SPEED_BASE + Math.random() * OBSTACLE_SPEED_VARIATION) * speedMultiplier * levelSpeedFactor;
                }

                obs.update();
                obs.draw();

                if (obs.type === 'alien' && obs.exploding) {
                    if (obs.explodeLife <= 0) obstacles.splice(i, 1);
                    continue;
                }

                if (checkCollision(player, obs)) {
                    playStruckSfx();
                    if (!tutorialMode && currentLevel === 1 && obs.type === 'shark') {
                        player.lives = 0;
                        updateLivesDisplay();
                        triggerLoseAnimation();
                        playLoseSfx();
                        stopAllLevelBgm(true);
                    } else if (!tutorialMode && currentLevel === 2 && obs.type === 'asteroid') {
                        player.lives = 0;
                        updateLivesDisplay();
                        triggerLoseAnimation();
                        playLoseSfx();
                        stopAllLevelBgm(true);
                    } else if (!tutorialMode && currentLevel === 3 && obs.type === 'plane') {
                        player.lives = 0;
                        updateLivesDisplay();
                        triggerLoseAnimation();
                        playLoseSfx();
                        stopAllLevelBgm(true);
                    } else {
                        player.hit();
                    }
                    obstacles.splice(i, 1);
                    continue;
                }

                if (obs.x + obs.width < 0) obstacles.splice(i, 1);
            }
        }

        for (let i = powerUps.length - 1; i >= 0; i--) {
            const pUp = powerUps[i];
            pUp.update();
            pUp.draw();

            if (checkCircleCollision(player, { x: pUp.x, y: pUp.y, radius: pUp.radius })) {
                if (pUp.type === 0) {
                    progress += 800;
                    createFloatingText('+速度!', pUp.x, pUp.y, '#ff9900');
                } else if (pUp.type === 1) {
                    player.hasShield = true;
                    createFloatingText('获得护盾!', pUp.x, pUp.y, '#00cc44');
                } else if (pUp.type === 2) {
                    if (player.lives < 3) {
                        player.lives++;
                        updateLivesDisplay();
                        createFloatingText('+生命!', pUp.x, pUp.y, '#00ff00');
                    } else {
                        createFloatingText('生命已满!', pUp.x, pUp.y, '#ffcc00');
                    }
                }
                // handle pickups for new boss-level items
                if (pUp.type === 0) {
                    // dorayaki: speed boost as before
                    progress += 800;
                    createFloatingText('+速度!', pUp.x, pUp.y, '#ff9900');
                } else if (pUp.type === 1) {
                    // shield / 御守
                    player.hasShield = true;
                    createFloatingText('获得护盾!', pUp.x, pUp.y, '#00cc44');
               
                } else if (pUp.type === 3) {
                    // time-stop
                    if (boss) {
                        boss.activateTimeStop(3);
                        createFloatingText('时间静止！', pUp.x, pUp.y, '#88ccff');
                    }
                }
                if (isTutorialSession) tutorialHasCollectedReward = true;
                powerUps.splice(i, 1);
                continue;
            }

            if (pUp.x + pUp.radius < 0) powerUps.splice(i, 1);
        }

        player.update();
        // Boss fight processing (level 4)
        if (currentLevel === 4 && boss) {
            boss.update();
            boss.draw();

            // draw decorative BOSS00 in bottom-right corner
            if (bossDecoImg.complete) {
                const decoWidth = 140;
                const ratio = bossDecoImg.height / bossDecoImg.width;
                const decoHeight = decoWidth * ratio;
                ctx.save();
                ctx.globalAlpha = 0.9;
                ctx.drawImage(bossDecoImg, canvas.width - decoWidth - 20, canvas.height - decoHeight - 20, decoWidth, decoHeight);
                ctx.restore();
            }

            // update and draw lasers; handle collisions with player
            for (let li = lasers.length - 1; li >= 0; li--) {
                const L = lasers[li];
                L.update();
                L.draw();

                // remove off-screen lasers
                if (L.x + L.width < 0 || L.x - L.width > canvas.width || L.y < -50 || L.y > canvas.height + 50) {
                    lasers.splice(li, 1);
                    continue;
                }

                // check collision with player (circle-rect)
                const laserRect = { x: L.x, y: L.y - L.height / 2, width: L.width, height: L.height };
                if (checkCollision(player, laserRect)) {
                    // handle shield or hit
                    if (player.hasShield) {
                        player.hasShield = false;
                        createFloatingText('护盾抵挡激光!', player.x, player.y, '#ffd700');
                    } else {
                        player.hit();
                    }
                    // remove laser on hit
                    lasers.splice(li, 1);
                    continue;
                }
            }
        }

        player.draw();

        if (levelGateOpen && levelGate) {
            drawDoor(levelGate);
            if (checkCollision(player, levelGate)) {
                if (isTutorialSession) {
                    tutorialReachedGate = true;
                    levelGateOpen = false;
                    levelGate = null;
                    createFloatingText('任意门通关指引完成!', player.x - 30, player.y - 20, '#00aa88');
                } else {
                    advanceLevel();
                }
                drawFloatingTexts();
                frames++;
                return;
            }
        }

        drawFloatingTexts();
        frames++;
    }

    function gameLoop(currentTime) {
        if (currentState === STATE.START || currentState === STATE.UI_GAMEOVER || currentState === STATE.UI_WIN) return;

        if (isPaused) {
            requestAnimationFrame(gameLoop);
            return;
        }

        if (!lastTime) lastTime = currentTime;
        const deltaTime = currentTime - lastTime;

        if (deltaTime >= FRAME_TIME) {
            lastTime = currentTime - (deltaTime % FRAME_TIME);
            drawBackground();

            if (currentState === STATE.LEVEL_PREVIEW) {
                player.draw();
                updateLevelPreview(currentTime);
            } else if (currentState === STATE.PLAYING) {
                updateLogic();
                // Handle boss defeated black screen flash effect
                if (bossDefeatedPhase === 1) {
                    bossDefeatedTimer++;
                    const flashDuration = 15; // frames per flash
                    const totalFlashes = 3;
                    const cycleTime = flashDuration * 2 * totalFlashes; // 90 frames total
                    
                    // Draw semi-transparent black screen for flash effect
                    const isFlashing = Math.floor(bossDefeatedTimer / flashDuration) % 2 === 0;
                    if (isFlashing) {
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        // Draw BOSS02 sprite in center of screen
                        if (bossImg02.complete) {
                            const centerX = canvas.width / 2;
                            const centerY = canvas.height / 2;
                            const displayScale = 2;
                            const displayWidth = bossImg02.width * displayScale;
                            const displayHeight = bossImg02.height * displayScale;
                            ctx.drawImage(bossImg02, centerX - displayWidth / 2, centerY - displayHeight / 2, displayWidth, displayHeight);
                        }
                    }
                    
                    if (bossDefeatedTimer >= cycleTime) {
                        bossDefeatedPhase = 0;
                        playFinalEndingSequence();
                    }
                }
            } else if (currentState === STATE.ANIM_WIN) {
                updateWinAnimation();
                drawWinAnimation();
                drawFloatingTexts();
            } else if (currentState === STATE.ANIM_LOSE) {
                for (const obs of obstacles) obs.draw();
                updateLoseAnimation();
                drawLoseAnimation();
            }
        }

        requestAnimationFrame(gameLoop);
    }

    function togglePause() {
        if (isPaused) {
            closePauseMenu(true);
        } else {
            openPauseMenu();
        }
    }

    function showSettings() {
        openSettingsPanel();
    }

    function hideSettings() {
        closeSettingsPanel();
    }

    function updateSliderFromPointer(trackElement, clientX) {
        const rect = trackElement.getBoundingClientRect();
        if (rect.width <= 0) return 0;
        const percent = (clientX - rect.left) / rect.width;
        return Math.min(1, Math.max(0, percent));
    }

    function applySliderValue(trackElement, value) {
        const kind = trackElement.dataset.track;
        if (kind === 'sfx') {
            setSfxVolume(value);
        } else {
            setMusicVolume(value);
        }
    }

    musicTracks.forEach((trackElement) => {
        const commitPointerValue = (event) => {
            const value = updateSliderFromPointer(trackElement, event.clientX);
            applySliderValue(trackElement, value);
        };

        trackElement.addEventListener('pointerdown', (event) => {
            if (event.button !== 0) return;
            event.preventDefault();
            activeSliderTrack = trackElement;
            trackElement.setPointerCapture?.(event.pointerId);
            commitPointerValue(event);
        });

        trackElement.addEventListener('pointermove', (event) => {
            if (activeSliderTrack !== trackElement) return;
            event.preventDefault();
            commitPointerValue(event);
        });

        trackElement.addEventListener('pointerup', () => {
            if (activeSliderTrack === trackElement) {
                activeSliderTrack = null;
            }
        });

        trackElement.addEventListener('pointercancel', () => {
            if (activeSliderTrack === trackElement) {
                activeSliderTrack = null;
            }
        });
    });

    window.addEventListener('pointerup', () => {
        activeSliderTrack = null;
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === 'p' || e.key === 'P') {
            e.preventDefault();
            togglePause();
            return;
        }

        if (keys.hasOwnProperty(e.key)) {
            keys[e.key] = true;
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].indexOf(e.key) > -1) e.preventDefault();
        }
        if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
    });

    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false;
    });

    document.getElementById('start-btn').addEventListener('click', startNewGameWithIntro);
    document.getElementById('load-btn').addEventListener('click', startFromCheckpoint);
    document.getElementById('restart-from-first-btn').addEventListener('click', startNewGame);
    document.getElementById('restart-from-save-btn').addEventListener('click', restartFromCurrentLevel);
    document.getElementById('restart-btn-win').addEventListener('click', startNewGame);

    optionsBtn.addEventListener('click', () => {
        coverOptions.classList.toggle('hidden');
    });

    toggleMusicBtn.addEventListener('click', () => {
        setMusicEnabled(!musicEnabled);
    });

    hudSettingsBtn.addEventListener('click', togglePause);

    hudTestBtn.addEventListener('click', () => {
        advanceLevel();
    });

    pauseResumeBtn.addEventListener('click', () => {
        closePauseMenu(true);
    });

    pauseRestartBtn.addEventListener('click', restartLevelFromPause);

    pauseSettingsBtn.addEventListener('click', () => {
        showSettings();
    });

    pauseHomeBtn.addEventListener('click', returnToMainMenuFromPause);

    settingsMusicBtn.addEventListener('click', () => {
        openMusicPanel();
    });

    settingsBackBtn.addEventListener('click', () => {
        closePauseMenu(true);
    });

    difficultyButtons.forEach((button) => {
        button.addEventListener('click', () => {
            setDifficulty(button.dataset.difficulty);
        });
    });

    musicBackBtn.addEventListener('click', () => {
        closePauseMenu(true);
    });

    tutorialModeBtn.addEventListener('click', startTutorialSession);

    clearSaveBtn.addEventListener('click', () => {
        clearCheckpoint();
    });

    ctx.font = '30px Arial';
    ctx.fillStyle = '#666';
    ctx.fillText('等待开始...', canvas.width / 2 - 80, canvas.height / 2);
    renderEnemyOverview();
    renderRewardOverview();
    setOverviewVisible(false);
    syncDifficultyUI();
    setMusicEnabled(true);
    updateSaveHint();
</script>
</body>
