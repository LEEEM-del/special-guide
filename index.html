<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮蛋瘦肉粥 - 完整结局版</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.55) 28%, rgba(240,248,255,0.2) 58%, rgba(220,240,255,0.1) 100%),
                linear-gradient(180deg, #eef8ff 0%, #dcefff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
        }

        #game-container {
            position: relative;
            width: 900px;
            height: 506px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.18);
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.65);
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        }

        canvas { display: block; }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; transition: opacity 0.5s ease;
        }

        .hidden { display: none !important; }

        h1 { color: #0088cc; font-size: 36px; margin-bottom: 10px; text-shadow: 2px 2px 0px white; }
        p { color: #333; font-size: 18px; margin-bottom: 30px; text-align: center; line-height: 1.6; }

        button {
            padding: 12px 30px; font-size: 20px;
            background-color: #ffcc00; color: #d13d00;
            border: none; border-radius: 30px; cursor: pointer;
            font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }
        button:hover { background-color: #ffdb4d; transform: scale(1.05); }
        button:active { transform: scale(0.95); }

        #hud {
            position: absolute;
            top: 10px;
            left: 14px;
            right: 14px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 14px;
            z-index: 8;
            pointer-events: none;
        }

        .hud-left {
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }

        #hud-test-btn {
            position: fixed;
            left: 24px;
            top: 24px;
            z-index: 20;
            min-width: 104px;
            min-height: 32px;
            padding: 0 12px;
            border: 1px solid rgba(255, 208, 94, 0.9);
            border-radius: 999px;
            background: linear-gradient(180deg, #fff1a8 0%, #ffd45d 100%);
            color: #7a4300;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(174, 120, 0, 0.18);
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.55);
            pointer-events: auto;
            white-space: nowrap;
        }

        #hud-test-btn:hover {
            background: linear-gradient(180deg, #fff6be 0%, #ffe06f 100%);
            transform: scale(1.04);
        }

        #hud-test-btn:active {
            transform: scale(0.97);
        }

        #player-status-box {
            position: relative;
            width: 214px;
            height: 90px;
            background-repeat: no-repeat;
            background-size: contain;
            background-position: left top;
            image-rendering: pixelated;
        }

        #player-status-box.level-1 {
            background-image: url('assets/img/player/ui/UI_Bar_sheet8.png');
        }

        #player-status-box.level-2 {
            background-image: url('assets/img/player/ui/UI_Bar_sheet9.png');
        }

        #player-status-box.level-3 {
            background-image: url('assets/img/player/ui/UI_Bar_sheet10.png');
        }

        #player-status-box.level-4 {
            background-image: url('assets/img/player/ui/UI_Bar_sheet11.png');
        }

        .lives {
            display: flex;
            align-items: center;
            gap: 3px;
            min-width: 105px;
            height: 24px;
            margin-top: 0;
            transform: translateX(-10px);
        }

        .heart-icon {
            width: 37px;
            height: 27px;
            display: inline-block;
            background-image: url('assets/img/player/ui/life.png');
            background-size: 300% 100%;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            filter: drop-shadow(0 1px 0 rgba(23, 10, 18, 0.65));
        }

        .heart-icon.full {
            background-position: 0 0;
        }

        .heart-icon.half {
            background-position: 50% 0;
        }

        .heart-icon.empty {
            background-position: 100% 0;
        }

        .progress-container {
            height: 16px;
            margin-top: 0;
            background: rgba(236, 246, 255, 0.92);
            border-radius: 999px;
            border: 2px solid rgba(255, 255, 255, 0.96);
            box-shadow: inset 0 0 0 1px rgba(129, 172, 212, 0.35);
            position: relative;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #ffcc00, #ff6600);
            border-radius: 8px; transition: width 0.1s linear;
        }

        .status-icons {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            margin-right: 4px;
            text-align: right;
            font-size: 17px;
            line-height: 1;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            transform: translateX(-10px);
        }

        .hud-right {
            pointer-events: auto;
            margin-top: 0;
        }

        #hud-settings-btn {
            width: 32px;
            height: 32px;
            border: 0;
            border-radius: 0;
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0;
            box-shadow: none;
            pointer-events: auto;
        }

        #hud-settings-btn:hover,
        #hud-settings-btn:active,
        #hud-settings-btn:focus,
        #hud-settings-btn:focus-visible {
            background: transparent !important;
            box-shadow: none;
            outline: none;
        }

        #hud-settings-btn img {
            width: 30px;
            height: 30px;
            image-rendering: pixelated;
            pointer-events: none;
        }

        #hud-settings-btn .key-hint {
            position: absolute;
            right: -5px;
            top: -5px;
            min-width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #cbe7ff;
            border: 1px solid rgba(255, 255, 255, 0.8);
            color: #0f3555;
            font-size: 9px;
            font-weight: 800;
            line-height: 14px;
            text-align: center;
            pointer-events: none;
        }

        .atlas-panel {
            position: absolute;
            left: 50%;
            top: 50%;
            z-index: 12;
            width: min(420px, 88vw);
            padding: 12px 12px 10px;
            border-radius: 16px;
            background: linear-gradient(165deg, rgba(255, 255, 255, 0.97), rgba(241, 250, 255, 0.93));
            border: 1px solid rgba(121, 177, 223, 0.5);
            box-shadow: 0 16px 30px rgba(27, 76, 117, 0.22);
            color: #153447;
            font-size: 12px;
            line-height: 1.45;
            pointer-events: none;
            user-select: none;
            backdrop-filter: blur(5px);
        }

        .atlas-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 16px 16px 0 0;
            background: linear-gradient(90deg, #5ac8ff, #ffca63);
            opacity: 0.9;
        }

        .atlas-enemy {
            transform: translate(-50%, -112%);
        }

        .atlas-reward {
            transform: translate(-50%, 12%);
        }

        .atlas-panel .title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 0.4px;
            margin-bottom: 9px;
            color: #0b5b8d;
        }

        .atlas-badge {
            font-size: 10px;
            font-weight: 700;
            color: #0b5b8d;
            background: rgba(11, 91, 141, 0.1);
            border: 1px solid rgba(11, 91, 141, 0.18);
            padding: 2px 7px;
            border-radius: 999px;
        }

        #enemy-overview-content {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        #reward-overview-content {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }

        .enemy-card {
            border: 1px solid rgba(121, 177, 223, 0.35);
            border-radius: 11px;
            padding: 8px 9px;
            background: linear-gradient(170deg, rgba(255, 255, 255, 0.92), rgba(246, 252, 255, 0.86));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .enemy-card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            font-weight: 700;
            color: #0f3e5d;
        }

        .enemy-main {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .enemy-icon {
            font-size: 17px;
            line-height: 1;
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        .enemy-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .enemy-tag {
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 999px;
            background: #e6f3ff;
            color: #0b5b8d;
        }

        .enemy-dmg {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 8px;
            background: #ffe8e8;
            color: #c9302c;
        }

        .cover-menu {
            width: min(520px, 86vw);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(121, 177, 223, 0.45);
            border-radius: 14px;
            box-shadow: 0 16px 32px rgba(27, 76, 117, 0.2);
            padding: 18px 18px 16px;
            text-align: center;
        }

        .cover-actions {
            display: grid;
            gap: 10px;
            margin: 8px 0 8px;
        }

        .cover-btn {
            width: 100%;
        }

        .cover-sub-btn {
            width: 100%;
            background: #eaf6ff;
            color: #1b5a85;
            border: 1px solid rgba(121, 177, 223, 0.45);
            box-shadow: 0 4px 10px rgba(27, 76, 117, 0.12);
        }

        .cover-sub-btn:hover {
            background: #dff1ff;
        }

        .cover-save-hint {
            margin: 8px 0 0;
            color: #245373;
            font-size: 14px;
            line-height: 1.45;
        }

        .cover-options {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed rgba(121, 177, 223, 0.45);
            display: grid;
            gap: 8px;
        }

        #start-screen {
            display: block;
            background-color: #000;
            background-image: url('assets/img/story/start01.jpg');
            background-position: center;
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        .start-actions {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .start-ui-btn {
            position: absolute;
            width: 290px;
            height: 48px;
            border-radius: 0;
            border: 0;
            padding: 0;
            background: transparent;
            color: transparent;
            font-size: 0;
            line-height: 0;
            box-shadow: none;
            cursor: pointer;
            transform-origin: center;
            transition: transform 0.1s ease;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
        }

        .start-ui-btn:hover {
            transform: scale(1.06);
            background: transparent !important;
            background-color: transparent !important;
            border-color: transparent !important;
        }

        .start-ui-btn:active {
            transform: scale(1.1);
            background: transparent !important;
            background-color: transparent !important;
            border-color: transparent !important;
        }

        .start-ui-btn:focus,
        .start-ui-btn:focus-visible {
            outline: none;
            box-shadow: none;
            background: transparent;
        }

        .start-ui-btn.start-btn-1 { left: 30px; top: 244px; }
        .start-ui-btn.start-btn-2 { left: 22px; top: 303px; }
        .start-ui-btn.start-btn-3 { left: 90px; top: 371px; }
        .start-ui-btn.start-btn-4 { left: 52px; top: 440px; }

        .start-save-hint {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }

        .start-options {
            position: absolute;
            left: 352px;
            top: 400px;
            z-index: 3;
            display: grid;
            gap: 8px;
            width: 200px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(3px);
        }

        .start-options .cover-sub-btn {
            width: 100%;
            border-radius: 10px;
            font-size: 14px;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.92);
            color: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: none;
        }

        #pause-overlay {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.48);
            pointer-events: auto;
            user-select: none;
        }

        .pause-panel {
            position: relative;
            width: min(540px, 92vw);
            aspect-ratio: 1 / 1;
            box-sizing: border-box;
            padding: 10% 12% 8%;
            background: url('assets/img/player/ui/suspend.png') center / 100% 100% no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .pause-panel.settings-mode {
            background: url('assets/img/player/ui/setting.png') center / 100% 100% no-repeat;
        }

        .pause-panel.settings-mode .pause-actions {
            display: none;
        }

        .pause-title {
            margin-top: 2%;
            font-size: clamp(28px, 4vw, 40px);
            font-weight: 700;
            color: #111;
            letter-spacing: 2px;
        }

        .pause-actions {
            width: 72%;
            margin-top: 12%;
            display: grid;
            gap: 12px;
        }

        .pause-btn {
            width: 100%;
            min-height: 54px;
            border: none;
            background: transparent;
            color: #111;
            font-size: clamp(20px, 2.6vw, 28px);
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.12s ease, opacity 0.12s ease;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .pause-btn:hover {
            transform: scale(1.03);
            filter: brightness(1.05);
        }

        .pause-btn:active {
            transform: scale(0.97);
        }

        #pause-settings-btn,
        #pause-home-btn {
            position: relative;
            top: -21.5px;
        }

        /* 像素风音乐面板 */
        .music-panel {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(430px, 90vw);
            box-sizing: border-box;
            padding: 14px 12px 12px;
            background: #ffffff;
            border: 5px solid #000000;
            border-radius: 8px;
            image-rendering: pixelated;
            box-shadow: 12px 10px 0 #f5d34a; /* 黄色底片风格 */
        }

        .music-panel::before {
            /* 顶部主标题条（像素化白色条带） */
            content: '';
            position: absolute;
            left: 50%;
            top: -34px;
            transform: translateX(-50%);
            width: calc(100% - 20px);
            height: 42px;
            background: #ffffff;
            border: 4px solid #000000;
            border-radius: 4px;
            box-shadow: 8px 6px 0 #f5d34a;
            image-rendering: pixelated;
            z-index: 5;
        }

        .music-panel-head {
            position: relative;
            margin-top: 8px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: #111;
            letter-spacing: 2px;
            z-index: 6;
            pointer-events: none;
        }

        .music-stage {
            margin-top: 6px;
            padding: 14px;
            background: #ffffff;
            border-top: 3px solid #000;
            box-shadow: inset 0 -6px 0 rgba(0,0,0,0.03);
            image-rendering: pixelated;
        }

        .music-row {
            display: grid;
            grid-template-columns: 100px 1fr;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .music-row:last-of-type {
            margin-bottom: 0;
        }

        .music-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #111;
            font-size: 20px;
            font-weight: 700;
            line-height: 1;
        }

        .music-label img {
            width: 28px;
            height: 28px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .music-track {
            position: relative;
            height: 26px;
            border-radius: 4px;
            border: 3px solid #000;
            background: #ffffff;
            box-shadow: inset 0 -6px 0 rgba(0,0,0,0.03);
            touch-action: none;
            user-select: none;
            overflow: hidden;
        }

        /* 斜条像素感填充 */
        .music-fill {
            position: absolute;
            left: 4px;
            top: 4px;
            bottom: 4px;
            width: 50%;
            border-radius: 2px;
            background-image: repeating-linear-gradient(45deg, #ffd83b 0 8px, #f5d34a 8px 16px);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.06);
            image-rendering: pixelated;
        }

        /* 豹爪风格的拇指（使用纯 CSS 模拟像素爪） */
        .music-thumb {
            position: absolute;
            top: 50%;
            left: calc(50% - 12px);
            width: 44px;
            height: 36px;
            transform: translate(-50%, -50%);
            cursor: grab;
            touch-action: none;
            image-rendering: pixelated;
        }

        .music-thumb:active { cursor: grabbing; }

        .music-thumb::before {
            content: '';
            position: absolute;
            left: 2px;
            top: 2px;
            width: 40px;
            height: 32px;
            background: #ffffff;
            border: 3px solid #000;
            box-sizing: border-box;
        }

        /* 爪子小垫 */
        .music-thumb::after {
            content: '';
            position: absolute;
            left: 8px;
            top: 6px;
            width: 24px;
            height: 20px;
            background:
                radial-gradient(circle at 50% 60%, #f7c3d1 0 30%, transparent 31%),
                radial-gradient(circle at 30% 25%, #f7c3d1 0 12%, transparent 13%),
                radial-gradient(circle at 70% 25%, #f7c3d1 0 12%, transparent 13%);
            background-size: 24px 20px;
            background-repeat: no-repeat;
            mix-blend-mode: normal;
            filter: none;
        }

        .music-back-btn {
            width: min(240px, 78%);
            min-height: 44px;
            margin: 14px auto 0;
            display: block;
            border-radius: 6px;
            border: 4px solid #000;
            background: #ffffff;
            color: #111;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 10px 8px 0 #f5d34a;
            image-rendering: pixelated;
        }

        .music-back-btn:hover { transform: translateY(-1px); }

        .music-back-btn:active { transform: translateY(2px); box-shadow: 6px 4px 0 #f5d34a; }

        .settings-panel {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(380px, 90vw);
            box-sizing: border-box;
            padding: 12px 12px 16px;
            border-radius: 6px;
            border: 6px solid #000;
            background: #ffffff;
            image-rendering: pixelated;
            box-shadow: 12px 10px 0 #f5d34a;
        }

        /* 顶部像素化白色标题条 + 两只猫耳 */
        .settings-panel::before {
            content: '';
            position: absolute;
            left: 50%;
            top: -44px;
            transform: translateX(-50%);
            width: calc(100% - 20px);
            height: 44px;
            background: #ffffff;
            border: 6px solid #000;
            border-radius: 4px;
            box-shadow: 8px 6px 0 #f5d34a;
            image-rendering: pixelated;
            z-index: 6;
        }

        .settings-panel::after {
            content: '';
            position: absolute;
            left: 28px;
            top: -54px;
            width: 20px;
            height: 22px;
            background: linear-gradient(180deg,#fff 0,#f6bed0 60%);
            border: 4px solid #000;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            transform: rotate(-12deg);
            z-index: 7;
            image-rendering: pixelated;
        }

        /* 右侧耳朵镜像 */
        .settings-panel .ear-right {
            content: '';
            position: absolute;
            right: 28px;
            top: -54px;
            width: 20px;
            height: 22px;
            background: linear-gradient(180deg,#fff 0,#f6bed0 60%);
            border: 4px solid #000;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            transform: rotate(12deg);
            z-index: 7;
            image-rendering: pixelated;
        }

        .settings-panel-head {
            position: relative;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            color: #111;
            letter-spacing: 4px;
            z-index: 8;
            pointer-events: none;
        }

        .settings-stage {
            margin-top: 8px;
            padding: 12px;
            border-radius: 6px;
            border: 4px solid #000;
            background: #ffffff;
            box-shadow: inset 0 -6px 0 rgba(0,0,0,0.06);
            image-rendering: pixelated;
        }

        .settings-music-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 6px 8px;
            border: 4px solid #000;
            background: #ffffff;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;

</head>

        </div>

    function getSavedCheckpoint() {
        try {
            const raw = localStorage.getItem(CHECKPOINT_STORAGE_KEY);
            if (!raw) return null;
            const save = JSON.parse(raw);
            if (!save || typeof save.level !== 'number') return null;
            if (save.level < 1 || save.level > 4) return null;
            return save;
        } catch (_) {
            return null;
        }
    }

    function updateSaveHint() {
        const save = getSavedCheckpoint();
        if (!save) {
            coverSaveHint.textContent = '存档点：暂无';
            return;
        }
        const saveTime = new Date(save.updatedAt || Date.now());
        const minute = String(saveTime.getMinutes()).padStart(2, '0');
        coverSaveHint.textContent = `存档点：第${save.level}关（${saveTime.getHours()}:${minute}）`;
    }

    function saveCheckpoint(overrideData = null) {
        const data = overrideData || {};
        const saveData = {
            level: Number.isFinite(data.level) ? data.level : currentLevel,
            lives: Number.isFinite(data.lives) ? data.lives : player.lives,
            hasShield: typeof data.hasShield === 'boolean' ? data.hasShield : player.hasShield,
            tutorialMode: typeof data.tutorialMode === 'boolean' ? data.tutorialMode : tutorialMode,
            updatedAt: Date.now()
        };
        localStorage.setItem(CHECKPOINT_STORAGE_KEY, JSON.stringify(saveData));
        updateSaveHint();
    }

    function loadVolumeSetting(key, fallback) {

            const raw = localStorage.getItem(key);
            if (raw === null) return fallback;
            const value = Number.parseFloat(raw);
            return Number.isFinite(value) ? Math.min(1, Math.max(0, value)) : fallback;
        } catch (_) {
            return fallback;
        }
    }

    function loadDifficultySetting(key, fallback) {

            return raw && DIFFICULTY_SPEED_MAP[raw] ? raw : fallback;
        } catch (_) {
            return fallback;
        }
    }

    function saveVolumeSetting(key, value) {

    function finishFinalEnding() {
        clearFinalTimer();
        clearFinalInteraction();
        finalSequenceReady = false;
        if (!storyOverBgm.paused) {
            storyOverBgm.pause();
            storyOverBgm.currentTime = 0;
        }
        introOverlay.classList.add('hidden');
        introEnd.style.opacity = 0;
        currentState = STATE.START;
        if (startScreen) startScreen.classList.remove('hidden');
        if (winScreen) winScreen.classList.add('hidden');
        if (gameOverScreen) gameOverScreen.classList.add('hidden');
    }

    function playFinalEndingSequence() {
        clearStoryTimer();
        storyOverlay.classList.add('hidden');
        buildFinalFrames();
        resetFinalFrames();

        stopAllLevelBgm(true);
        if (musicEnabled) {
            storyOverBgm.currentTime = 0;
            storyOverBgm.play().catch(() => {});
        }
        currentState = STATE.UI_WIN;
        if (startScreen) startScreen.classList.add('hidden');
        if (winScreen) winScreen.classList.add('hidden');
        if (gameOverScreen) gameOverScreen.classList.add('hidden');

        introOverlay.classList.remove('hidden');
        introScene.style.cursor = 'default';
        introOverlay.style.cursor = 'default';

        finalTimer = setTimeout(() => {
            finalSequenceReady = true;

            const moveToNextFrame = () => {
                if (!finalSequenceReady) return;
                if (finalCurrentIndex >= FINAL_SEQUENCE.length - 1) {
                    finishFinalEnding();
                    return;
                }

                if (finalFrames[finalCurrentIndex]) {
                    finalFrames[finalCurrentIndex].classList.remove('active');
                }
                finalCurrentIndex++;
                if (finalFrames[finalCurrentIndex]) {
                    finalFrames[finalCurrentIndex].classList.add('active');
                }

                if (finalCurrentIndex >= FINAL_SEQUENCE.length - 1) {
                    introScene.style.cursor = 'pointer';
                    introOverlay.style.cursor = 'pointer';
                    return;
                }

                introScene.style.cursor = 'pointer';
                introOverlay.style.cursor = 'pointer';
            };

            finalClickHandler = () => {
                if (introOverlay.classList.contains('hidden')) return;
                if (!finalSequenceReady) return;
                moveToNextFrame();
            };

            introScene.addEventListener('click', finalClickHandler);
            introOverlay.addEventListener('click', finalClickHandler);

            if (finalFrames[0]) {
                finalFrames[0].classList.add('active');
            }

            if (FINAL_SEQUENCE.length <= 1) {
                introScene.style.cursor = 'pointer';
                introOverlay.style.cursor = 'pointer';
            } else {
                introScene.style.cursor = 'pointer';
                introOverlay.style.cursor = 'pointer';
            }
        }, 5000);
    }

    function playIntroThenStart(nextStep) {
        clearStoryTimer();
        storyOverlay.classList.add('hidden');
        buildIntroFrames();
        resetIntroFrames();

        stopAllLevelBgm(true);

        // === 新增：如果开启了音乐，则播放序章音乐 ===
        if (musicEnabled) {
            storyBgm.currentTime = 0;
            storyBgm.play().catch(() => {});
        }

        currentState = STATE.START;
        introOverlay.classList.remove('hidden');

        const finishIntro = () => {
            clearIntroTimer();
            clearIntroInteraction();

            // === 新增：序章结束时停止序章音乐 ===
            if (!storyBgm.paused) {
                storyBgm.pause();
                storyBgm.currentTime = 0;
            }

            introEnd.style.opacity = 1;
            introTimer = setTimeout(() => {
                introOverlay.classList.add('hidden');
                introEnd.style.opacity = 0;
                if (typeof nextStep === 'function') nextStep();
            }, 1300);
        };

        const moveToNextFrame = () => {
            if (introCurrentIndex >= INTRO_SEQUENCE.length - 1) {
                finishIntro();
                return;
            }

            introFrames[introCurrentIndex].classList.remove('active');
            introCurrentIndex++;
            introFrames[introCurrentIndex].classList.add('active');

            if (introCurrentIndex >= INTRO_SEQUENCE.length - 1) {
                introScene.style.cursor = 'pointer';
                introOverlay.style.cursor = 'pointer';
                return;
            }

            if (isIntroAutoFrame(introCurrentIndex)) {
                introScene.style.cursor = 'default';
                introOverlay.style.cursor = 'default';
                clearIntroTimer();
                introTimer = setTimeout(moveToNextFrame, INTRO_SEQUENCE[introCurrentIndex].delay);
            } else {
                introScene.style.cursor = 'pointer';
                introOverlay.style.cursor = 'pointer';
            }
        };

        introClickHandler = () => {
            if (introOverlay.classList.contains('hidden')) return;
            if (isIntroAutoFrame(introCurrentIndex)) return;
            moveToNextFrame();
        };
        introScene.addEventListener('click', introClickHandler);
        introOverlay.addEventListener('click', introClickHandler);

        if (isIntroAutoFrame(introCurrentIndex)) {
            introScene.style.cursor = 'default';
            introOverlay.style.cursor = 'default';
            introTimer = setTimeout(moveToNextFrame, INTRO_SEQUENCE[introCurrentIndex].delay);
        } else {
            introScene.style.cursor = 'pointer';
            introOverlay.style.cursor = 'pointer';
        }
    }

    function playStoryThenStartFormalGame() {
        const lines = [
            '训练结束！皮蛋喵已经熟悉了空中移动和拾取道具。',
            '真正的救援马上开始，胖虎的遥控飞机正在加速逃离！',
            '抓紧竹蜻蜓，冲向第一关，救回主人！'
        ];

        clearStoryTimer();
        storyOverlay.classList.remove('hidden');

        let idx = 0;
        const step = () => {
            if (idx >= lines.length) {
                storyOverlay.classList.add('hidden');
                clearCheckpoint();
                initGame();
                return;
            }
            storyTitle.textContent = `剧情 ${idx + 1}/${lines.length}`;
            storyText.textContent = lines[idx];
            idx++;
            storyTimer = setTimeout(step, 2300);
        };
        step();
    }

    function finishTutorialSession() {
        isTutorialSession = false;
        tutorialMode = false;
        suppressCheckpointSave = false;
        tutorialStartTime = 0;
        tutorialHasMoved = false;
        tutorialHasCollectedReward = false;
        tutorialReachedGate = false;
        tutorialHintText = '';
        setTutorialMode(false);
        setOverviewVisible(false);
        tutorialPanel.classList.add('hidden');
        currentState = STATE.START;
        playStoryThenStartFormalGame();
    }

    function startTutorialSession() {
        clearStoryTimer();
        storyOverlay.classList.add('hidden');
        suppressCheckpointSave = true;
        isTutorialSession = true;
        tutorialStartTime = 0;
        tutorialHasMoved = false;
        tutorialHasCollectedReward = false;
        tutorialReachedGate = false;
        tutorialHintText = '沿着教程地图前进，抵达传送门后进入第一关。';
        tutorialMapActive = true;
        tutorialMapWidth = 0;
        tutorialMapCameraX = 0;
        tutorialPlayerWorldX = 0;
        tutorialDoorEntered = false;
        setTutorialMode(true);
        coverOptions.classList.add('hidden');
        initGame({ level: 1, lives: 3, hasShield: false, tutorialMode: true });
    }

    function updateTutorialFlow() {
        if (!isTutorialSession || currentState !== STATE.PLAYING) return false;

        if (tutorialMapActive) {
            if (!levelGate || !levelGateOpen) {
                tutorialHintText = '沿着地图向右前进，找到传送门。';
            } else {
                const doorCenterX = levelGate.worldX + levelGate.width / 2;
                const remain = Math.max(0, Math.floor(doorCenterX - tutorialPlayerWorldX));
                if (remain > 0) {
                    tutorialHintText = `继续向右，距离传送门约 ${remain}px。`;
                } else {
                    tutorialHintText = '进入传送门，开始第一关！';
                }
            }
            return false;
        }

        return false;
    }

    function setOverviewVisible(visible) {
        if (visible) {
            enemyOverview.classList.remove('hidden');
            rewardOverview.classList.remove('hidden');
            levelPreviewHint.classList.remove('hidden');
        } else {
            enemyOverview.classList.add('hidden');
            rewardOverview.classList.add('hidden');
            levelPreviewHint.classList.add('hidden');
        }
    }

    function startLevelPreview() {
        isPaused = false;
        pauseOverlay.classList.add('hidden');
        if (isTutorialSession && tutorialMapActive) {
            setOverviewVisible(false);
            levelPreviewHint.classList.add('hidden');
            tutorialPlayerWorldX = player.x;
            tutorialMapCameraX = 0;
            currentState = STATE.PLAYING;
            updateTutorialPanel();
            return;
        }
        if (!isTutorialSession) {
            setOverviewVisible(false);
            levelPreviewHint.classList.add('hidden');
            currentState = STATE.PLAYING;
            return;
        }
        levelPreviewStartTime = performance.now();
        setOverviewVisible(true);
        currentState = STATE.LEVEL_PREVIEW;
        updateTutorialPanel();
    }

    function updateLevelPreview(currentTime) {
        const elapsed = currentTime - levelPreviewStartTime;
        const remainMs = Math.max(0, LEVEL_PREVIEW_DURATION - elapsed);
        const remainSec = Math.max(1, Math.ceil(remainMs / 1000));
        const levelName = LEVELS[currentLevel]?.name || '';
        const modeLabel = tutorialMode ? '【教程模式】' : '';
        levelPreviewHint.textContent = `第${currentLevel}关 ${levelName}${modeLabel} · ${remainSec} 秒后开始`;

        if (elapsed >= LEVEL_PREVIEW_DURATION) {
            setOverviewVisible(false);
            for (const key in keys) keys[key] = false;
            currentState = STATE.PLAYING;
            // entering PLAYING -> spawn boss if level 4
            if (currentLevel === 4) {
                boss = new Boss();
                lasers = [];
            }
            if (isTutorialSession) tutorialStartTime = performance.now();
            updateTutorialPanel();
        }
    }

    function createFloatingText(text, x, y, color) {
        floatingTexts.push({ text, x, y, color, life: 30 });
    }

    function drawFloatingTexts() {
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            const ft = floatingTexts[i];
            ctx.fillStyle = ft.color;
            ctx.font = 'bold 20px Arial';
            ctx.globalAlpha = ft.life / 30;
            ctx.fillText(ft.text, ft.x, ft.y);
            ctx.globalAlpha = 1.0;
            ft.y -= 1;
            ft.life--;
            if (ft.life <= 0) floatingTexts.splice(i, 1);
        }
    }

    function renderEnemyOverview() {
        const enemies = ENEMY_OVERVIEW_DATA[currentLevel] || [];
        if (!enemyOverviewContent) return;

        enemyOverviewContent.innerHTML = enemies.map((enemy) => `
            <div class="enemy-card">
                <div class="enemy-card-head">
                    <span class="enemy-main"><span class="enemy-icon">${enemy.icon}</span><span class="enemy-name">${enemy.name}</span></span>
                    <span class="enemy-tag">${enemy.tag}</span>
                </div>
                <span class="enemy-dmg">伤害: ${enemy.damage}</span>
            </div>
        `).join('');
    }

    function renderRewardOverview() {
        if (!rewardOverviewContent) return;

        rewardOverviewContent.innerHTML = REWARD_OVERVIEW_DATA.map((reward) => `
            <div class="enemy-card">
                <div class="enemy-card-head">
                    <span class="enemy-main"><span class="enemy-icon">${reward.icon}</span><span class="enemy-name">${reward.name}</span></span>
                    <span class="enemy-tag">${reward.tag}</span>
                </div>
                <span class="enemy-dmg reward-effect">效果: ${reward.effect}</span>
            </div>
        `).join('');
    }

    const player = {
        x: 150,
        y: 200,
        radius: 25,
        moveSpeed: PLAYER_SPEED_START,
        lives: 3,
        hasShield: false,
        isInvincible: false,
        invincibleTimer: 0,
        hasPropeller: true,

        draw() {
            if (this.isInvincible && Math.floor(frames / 5) % 2 === 0 && currentState === STATE.PLAYING) return;

            const useSkySkin = true;

            if (this.hasShield) {
                if (useSkySkin && shieldImg.complete) {
                    const shieldSize = (this.radius + 16) * 2;
                    ctx.save();
                    ctx.globalAlpha = 0.7;
                    ctx.drawImage(shieldImg, this.x - shieldSize / 2, this.y - shieldSize / 2, shieldSize, shieldSize);
                    ctx.restore();
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.4)';
                    ctx.fill();
                }
            }

            const isFalling = currentState === STATE.ANIM_LOSE;
            const isShooting = currentState === STATE.ANIM_WIN && animPhase === 1 && animData.cannonActive;
            let currentImg = doraemonImg;
            if (!isFalling && !isShooting) {
                if (currentLevel === 1 && doraemonSeaImg.complete) {
                    currentImg = doraemonSeaImg;
                } else if (currentLevel === 2 && doraemonSpaceImg.complete) {
                    currentImg = doraemonSpaceImg;
                }
            }
            if (isFalling) currentImg = doraemonFallImg;
            else if (isShooting) currentImg = doraemonShootImg;

            if (useSkySkin && currentImg.complete) {
                ctx.save();
                ctx.translate(this.x, this.y);
                const size = this.radius * 3.1;
                ctx.drawImage(currentImg, -size / 2, -size / 2, size, size);
                ctx.restore();
                return;
            }

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#0088cc';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(this.x + 5, this.y + 5, this.radius * 0.7, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(this.x + 15, this.y - 5, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#ff0000';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(this.x + 10, this.y - 5, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(this.x + 5, this.y + 5, 8, 0, Math.PI);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(this.x, this.y + this.radius - 5, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#ffcc00';
            ctx.fill();

            if (this.hasPropeller) {
                ctx.fillStyle = '#e6b800';
                ctx.fillRect(this.x - 2, this.y - this.radius - 8, 4, 8);
                ctx.fillRect(this.x - 12, this.y - this.radius - 10, 24, 3);
            }
        },

        update() {
            if (currentState !== STATE.PLAYING) return;

            let dx = 0;
            let dy = 0;
            if (keys.ArrowUp || keys.w) dy -= this.moveSpeed;
            if (keys.ArrowDown || keys.s) dy += this.moveSpeed;
            if (keys.ArrowLeft || keys.a) dx -= this.moveSpeed;
            if (keys.ArrowRight || keys.d) dx += this.moveSpeed;

            this.x += dx;
            this.y += dy;

            if (isTutorialSession && (dx !== 0 || dy !== 0)) tutorialHasMoved = true;

            if (this.x - this.radius < 0) this.x = this.radius;
            if (this.x + this.radius > canvas.width) this.x = canvas.width - this.radius;
            if (this.y - this.radius < 0) this.y = this.radius;
            if (this.y + this.radius > canvas.height) this.y = canvas.height - this.radius;

            if (this.isInvincible) {
                this.invincibleTimer--;
                if (this.invincibleTimer <= 0) this.isInvincible = false;
            }

            statusDisplay.innerHTML = this.hasShield ? '🛡️' : '';
        },

        hit() {
            if (this.isInvincible) return;

            if (this.hasShield) {
                this.hasShield = false;
                createFloatingText('护盾抵挡!', this.x, this.y, '#ffd700');
            } else {
                this.lives--;
                updateLivesDisplay();
                progress = Math.max(0, progress - 500);
                createFloatingText('哎呀!', this.x, this.y, '#ff0000');

                if (this.lives <= 0) {
                    if (isTutorialSession) {
                        this.lives = 1;
                        updateLivesDisplay();
                        createFloatingText('教学模式不会失败', this.x, this.y - 20, '#0099ff');
                        this.isInvincible = true;
                        this.invincibleTimer = 90;
                        return;
                    }
                    triggerLoseAnimation();
                    playLoseSfx();
                    stopAllLevelBgm(true);
                    return;
                }
            }
            this.isInvincible = true;
            this.invincibleTimer = 60;
        }
    };

    class Obstacle {
        constructor(type = null) {
            this.x = canvas.width;
            this.type = type || LEVELS[currentLevel].spawnPool[Math.floor(Math.random() * LEVELS[currentLevel].spawnPool.length)];
            this.width = 40;
            this.height = 40;
            this.speed = OBSTACLE_SPEED_BASE + Math.random() * OBSTACLE_SPEED_VARIATION;
            this.angle = 0;
            this.birdState = 1;
            this.sharkState = 1;
            this.starState = 1;
            this.meteorState = 1;
            this.planeState = 1;
            this.kiteState = 1;
            this.chaseFactor = 0;
            this.chaseTimer = 0;
            this.exploding = false;
            this.explodeLife = 0;

            switch (this.type) {
                case 'fish':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.width = 96;
                    this.height = 96;
                    this.emoji = '🐟';
                    break;
                case 'shark':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.width = 150;
                    this.height = 100;
                    this.emoji = '🦈';
                    this.speed = OBSTACLE_SPEED_BASE + OBSTACLE_FAST_BONUS;
                    break;
                case 'star':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.starState = Math.floor(Math.random() * 2) + 1;
                    this.emoji = '⭐';
                    break;
                case 'meteor':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.meteorState = Math.floor(Math.random() * 2) + 1;
                    this.emoji = '☄️';
                    break;
                case 'asteroid':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.width = 50;
                    this.height = 50;
                    this.emoji = '🪨';
                    this.speed = OBSTACLE_SPEED_BASE + OBSTACLE_FAST_BONUS;
                    break;
                case 'alien':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.width = 52;
                    this.height = 52;
                    this.emoji = '👾';
                    this.speed = OBSTACLE_SPEED_BASE + 0.9;
                    this.chaseFactor = 0.09;
                    this.chaseTimer = ALIEN_CHASE_FRAMES;
                    break;
                case 'bird':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.emoji = '🦅';
                    break;
                case 'pole':
                    this.width = 30;
                    this.height = 100 + Math.random() * 100;
                    this.y = canvas.height - this.height;
                    this.emoji = '🗼';
                    break;
                case 'kite':
                    this.width = 40;
                    this.height = 80 + Math.random() * 50;
                    this.y = 0;
                    this.kiteState = Math.floor(Math.random() * 2) + 1;
                    this.emoji = '🪁';
                    this.baseY = 0;
                    this.angle = Math.random() * Math.PI * 2;
                    this.chaseFactor = 0.08;
                    this.chaseTimer = ALIEN_CHASE_FRAMES;
                    break;
                case 'plane':
                    this.y = Math.max(20, Math.min(canvas.height - 20, player.y + (Math.random() * 100 - 50)));
                    this.planeState = Math.floor(Math.random() * 2) + 1;
                    this.speed = OBSTACLE_SPEED_BASE + OBSTACLE_FAST_BONUS;
                    this.chaseFactor = 0.08;
                    this.chaseTimer = ALIEN_CHASE_FRAMES;
                    this.emoji = '✈️';
                    break;
            }
        }

        draw() {
            const centerX = this.x + this.width / 2;
            const centerY = this.y + this.height / 2;

            if ((currentLevel === 3 || currentLevel === 4) && this.type === 'bird') {
                if (birdImg.complete) {
                    const size = this.width * 1.5;
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.drawImage(birdImg, -size / 2, -size / 2, size, size);
                    ctx.restore();
                    return;
                }
            }

            if ((currentLevel === 3 || currentLevel === 4) && this.type === 'pole' && poleImg.complete) {
                ctx.save();
                const scale = this.height / poleImg.height;
                const width = poleImg.width * scale;
                ctx.drawImage(poleImg, this.x + (this.width - width) / 2, this.y, width, this.height);
                ctx.restore();
                return;
            }

            if ((currentLevel === 3 || currentLevel === 4) && this.type === 'kite') {
                const currentKiteImg = this.kiteState === 1 ? kiteImg1 : kiteImg2;
                if (currentKiteImg.complete) {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    const scale = Math.min(this.width / currentKiteImg.width, this.height / currentKiteImg.height);
                    const drawWidth = currentKiteImg.width * scale * 0.75;
                    const drawHeight = currentKiteImg.height * scale * 0.75;
                    ctx.drawImage(currentKiteImg, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
                    ctx.restore();
                    return;
                }
            }

            if ((currentLevel === 3 || currentLevel === 4) && this.type === 'plane') {
                const currentPlaneEnemyImg = this.planeState === 1 ? planeEnemyImg1 : planeEnemyImg2;
                if (currentPlaneEnemyImg.complete) {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    const scale = Math.min(this.width / currentPlaneEnemyImg.width, this.height / currentPlaneEnemyImg.height);
                    const drawWidth = currentPlaneEnemyImg.width * scale * 4;
                    const drawHeight = currentPlaneEnemyImg.height * scale * 4;
                    ctx.drawImage(currentPlaneEnemyImg, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#3498db';
                ctx.beginPath();
                ctx.ellipse(0, 0, 25, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-5, 0);
                ctx.lineTo(-15, -20);
                ctx.lineTo(5, -20);
                ctx.lineTo(10, 0);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-20, 0);
                ctx.lineTo(-25, -15);
                ctx.lineTo(-15, -5);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                return;
            }

            if (this.type === 'fish') {
                if (fishImg.complete) {
                    const size = Math.min(this.width, this.height);
                    ctx.save();
                    ctx.drawImage(fishImg, centerX - size / 2, centerY - size / 2, size, size);
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#ff6b6b';
                ctx.beginPath();
                ctx.ellipse(0, 0, 20, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(15, 0);
                ctx.lineTo(25, -8);
                ctx.lineTo(25, 8);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(-8, -3, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(-6, -3, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                return;
            }

            if (this.type === 'shark') {
                if (sharkImg.complete) {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    const scale = Math.min(this.width / sharkImg.width, this.height / sharkImg.height);
                    const drawWidth = sharkImg.width * scale * 2;
                    const drawHeight = sharkImg.height * scale * 2;
                    ctx.drawImage(sharkImg, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#4a90d9';
                ctx.beginPath();
                ctx.ellipse(0, 0, 30, 18, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(25, 0);
                ctx.lineTo(40, -12);
                ctx.lineTo(40, 12);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(-5, -25);
                ctx.lineTo(5, -15);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(-12, -5, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(-10, -5, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(-5, 8);
                ctx.lineTo(-3, 12);
                ctx.lineTo(-1, 8);
                ctx.fill();
                ctx.restore();
                return;
            }

            if (this.type === 'star') {
                const currentStarImg = this.starState === 1 ? starImg1 : starImg2;
                if (currentStarImg.complete) {
                    ctx.save();
                    const scale = Math.min(this.width / currentStarImg.width, this.height / currentStarImg.height);
                    const drawWidth = currentStarImg.width * scale * 2;
                    const drawHeight = currentStarImg.height * scale * 2;
                    ctx.drawImage(currentStarImg, centerX - drawWidth / 2, centerY - drawHeight / 2, drawWidth, drawHeight);
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * 15, -Math.sin((18 + i * 72) * Math.PI / 180) * 15);
                    ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * 7, -Math.sin((54 + i * 72) * Math.PI / 180) * 7);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                return;
            }

            if (this.type === 'meteor') {
                const currentMeteorImg = this.meteorState === 1 ? meteorImg1 : meteorImg2;
                if (currentMeteorImg.complete) {
                    const targetSize = 62;
                    const scale = targetSize / Math.max(currentMeteorImg.naturalWidth || 1, currentMeteorImg.naturalHeight || 1);
                    const drawWidth = currentMeteorImg.naturalWidth * scale;
                    const drawHeight = currentMeteorImg.naturalHeight * scale;
                    ctx.save();
                    ctx.drawImage(currentMeteorImg, centerX - drawWidth / 2, centerY - drawHeight / 2, drawWidth, drawHeight);
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#ff9500';
                ctx.beginPath();
                ctx.ellipse(0, 0, 18, 10, Math.PI / 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255, 149, 0, 0.5)';
                ctx.beginPath();
                ctx.moveTo(18, -5);
                ctx.lineTo(35, -10);
                ctx.lineTo(35, 0);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                return;
            }

            if (this.type === 'asteroid') {
                if (planet2Img.complete) {
                    const size = this.width * 1.8;
                    ctx.save();
                    ctx.drawImage(planet2Img, this.x + (this.width - size) / 2, this.y + (this.height - size) / 2, size, size);
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#8b7355';
                ctx.beginPath();
                ctx.arc(0, 0, 22, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#6b5344';
                ctx.beginPath();
                ctx.arc(-5, -5, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(8, 3, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(-3, 8, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                return;
            }

            if (this.type === 'alien') {
                if (this.exploding) {
                    const blastProgress = 1 - (this.explodeLife / 18);
                    const blastR = 10 + blastProgress * 26;
                    ctx.save();
                    ctx.globalAlpha = this.explodeLife / 18;
                    ctx.fillStyle = 'rgba(255, 180, 60, 0.95)';
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, blastR, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255, 80, 80, 0.9)';
                    ctx.beginPath();
                    ctx.arc(centerX + 6, centerY - 4, blastR * 0.55, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    return;
                }

                if (alienImg.complete && alienImg.naturalWidth > 0 && alienImg.naturalHeight > 0) {
                    const scale = Math.min(this.width / alienImg.naturalWidth, this.height / alienImg.naturalHeight);
                    const drawWidth = alienImg.naturalWidth * scale * 2;
                    const drawHeight = alienImg.naturalHeight * scale * 2;
                    ctx.save();
                    ctx.drawImage(
                        alienImg,
                        centerX - drawWidth / 2,
                        centerY - drawHeight / 2,
                        drawWidth,
                        drawHeight
                    );
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);

                ctx.fillStyle = '#7f8c8d';
                ctx.beginPath();
                ctx.ellipse(0, 8, 22, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(120, 220, 255, 0.55)';
                ctx.beginPath();
                ctx.arc(0, 2, 12, Math.PI, 0);
                ctx.lineTo(12, 2);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#9bff6a';
                ctx.beginPath();
                ctx.arc(0, 0, 7, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#1f2d3d';
                ctx.beginPath();
                ctx.arc(-3, -1, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(3, -1, 1.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffd166';
                ctx.beginPath();
                ctx.arc(-12, 9, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(0, 10, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, 9, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
                return;
            }

            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            let drawY = this.y + this.height / 2;
            if (this.type === 'kite') drawY = this.y + this.height - 20;
            ctx.fillText(this.emoji, this.x + this.width / 2, drawY);
        }

        update() {
            this.x -= this.speed;
            if (this.type === 'fish' || this.type === 'star' || this.type === 'meteor' || this.type === 'bird' || this.type === 'shark') {
                this.y += Math.sin(this.angle) * 3;
                this.angle += 0.1;
            }
            if (this.type === 'star') {
                this.starState = Math.floor(frames / 60) % 2 === 0 ? 1 : 2;
            }
            if (this.type === 'meteor') {
                this.meteorState = Math.floor(frames / 60) % 2 === 0 ? 1 : 2;
            }
            if (this.type === 'plane') {
                this.planeState = Math.floor(frames / 60) % 2 === 0 ? 1 : 2;
            }
            if (this.type === 'kite') {
                this.kiteState = Math.floor(frames / 60) % 2 === 0 ? 1 : 2;
            }
            if (this.type === 'alien') {
                if (this.exploding) {
                    this.explodeLife--;
                } else if (this.chaseTimer > 0) {
                    const targetY = player.y - this.height / 2;
                    this.y += (targetY - this.y) * this.chaseFactor;
                    this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));
                    this.chaseTimer--;
                    if (this.chaseTimer <= 0) {
                        this.exploding = true;
                        this.explodeLife = 18;
                        this.speed = 0;
                        createFloatingText('自爆!', this.x, this.y - 10, '#ff7733');
                    }
                }
            }
            if (this.type === 'plane' && this.chaseTimer > 0) {
                const targetY = player.y - this.height / 2;
                this.y += (targetY - this.y) * this.chaseFactor;
                this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));
                this.chaseTimer--;
            }
            if (this.type === 'kite' && this.chaseTimer > 0) {
                const targetY = player.y - this.height / 2;
                this.y += (targetY - this.y) * this.chaseFactor;
                this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));
                this.chaseTimer--;
            }
        }
    }

    class PowerUp {
        constructor(type = null) {
            this.x = canvas.width;

            this.speed = SCROLL_SPEED * getDifficultySpeedMultiplier();

            outerGradient.addColorStop(0.6, '#14285f');
            outerGradient.addColorStop(1, '#0b1538');
            ctx.fillStyle = outerGradient;
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.42, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#203a7a';
            ctx.lineWidth = 7;
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.38, 0, Math.PI * 2);
            ctx.stroke();

            // pixel rim highlights
            ctx.fillStyle = '#5f89d8';
            ctx.fillRect(-8, -41, 16, 6);
            ctx.fillRect(-8, 35, 16, 6);
            ctx.fillRect(-41, -8, 6, 16);
            ctx.fillRect(35, -8, 6, 16);

            ctx.fillStyle = '#99c5ff';
            ctx.fillRect(-6, -37, 12, 4);
            ctx.fillRect(-6, 33, 12, 4);
            ctx.fillRect(-37, -6, 4, 12);
            ctx.fillRect(33, -6, 4, 12);

            // inner core
            const coreGradient = ctx.createRadialGradient(-3, -3, 8, 0, 0, 24);
            coreGradient.addColorStop(0, '#4570ff');
            coreGradient.addColorStop(1, '#2f4fb6');
            ctx.fillStyle = coreGradient;
            ctx.beginPath();
            ctx.arc(0, 0, 23, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#c0f2ff';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(0, 0, 27, 0, Math.PI * 2);
            ctx.stroke();

            // keyhole center
            ctx.fillStyle = '#eaf6ff';
            ctx.fillRect(-2, -10, 4, 14);
            ctx.fillRect(-1, 2, 2, 10);

            // debris/pixel sparkles
            ctx.fillStyle = '#b7dcff';
            const dots = [
                [-23, -16], [21, -21], [27, 10], [-26, 18], [-16, 24], [15, 24], [-29, 2], [31, -2]
            ];
            for (const [dx, dy] of dots) {
                ctx.fillRect(dx, dy, 4, 4);
            }

            ctx.fillStyle = '#8fb8ff';
            ctx.fillRect(-19, -25, 6, 6);
            ctx.fillRect(16, -19, 6, 6);
            ctx.fillRect(10, 17, 5, 5);
            ctx.fillRect(-12, 19, 5, 5);
